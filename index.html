  <script>
    let currentFolderId = null;
    let breadcrumbs = [];
    let folderNameMap = {};
    let allFiles = [];         // cache toàn bộ files
    let activeFilter = 'all'; // filter đang chọn

    // ==== Filter definitions ====
    const FILTERS = [
      { key: 'all', label: 'Tất cả', icon: 'mdi-view-grid', match: () => true },
      { key: 'folder', label: 'Thư mục', icon: 'mdi-folder', match: f => f.isFolder },
      { key: 'apk', label: 'APK', icon: 'mdi-android', match: f => ext(f) === 'apk' },
      { key: 'image', label: 'Ảnh', icon: 'mdi-file-image', match: f => ['png', 'jpg', 'jpeg', 'gif', 'bmp', 'webp', 'svg'].includes(ext(f)) },
      { key: 'video', label: 'Video', icon: 'mdi-file-video', match: f => ['mp4', 'mov', 'avi', 'mkv', 'webm'].includes(ext(f)) },
      { key: 'audio', label: 'Âm nhạc', icon: 'mdi-file-music', match: f => ['mp3', 'wav', 'flac', 'ogg', 'aac'].includes(ext(f)) },
      { key: 'doc', label: 'Tài liệu', icon: 'mdi-file-document', match: f => ['pdf', 'doc', 'docx', 'xls', 'xlsx', 'ppt', 'pptx', 'txt', 'csv'].includes(ext(f)) },
      { key: 'archive', label: 'Nén', icon: 'mdi-folder-zip', match: f => ['zip', 'rar', '7z', 'tar', 'gz'].includes(ext(f)) },
      { key: 'code', label: 'Code', icon: 'mdi-code-braces', match: f => ['js', 'ts', 'py', 'php', 'cs', 'java', 'html', 'css', 'json', 'xml', 'sh', 'cpp', 'c', 'go', 'rs'].includes(ext(f)) },
      { key: 'exe', label: 'Exe/App', icon: 'mdi-application', match: f => ['exe', 'msi', 'dmg', 'deb', 'rpm'].includes(ext(f)) },
    ];
    const API_BASE = "https://tamko.shopacc17.site";

    function ext(f) {
      return (f.name || '').split('.').pop().toLowerCase();
    }

    // ==== Render filter chips ====
    function renderFilterBar(files) {
      const bar = document.getElementById('mobileFilterBar');
      if (!bar) return;
      bar.innerHTML = FILTERS.map(filter => {
        const count = filter.key === 'all' ? files.length : files.filter(filter.match).length;
        if (count === 0 && filter.key !== 'all') return ''; // ẩn filter không có file
        return `
          <div class="filter-chip ${activeFilter === filter.key ? 'active' : ''}"
               onclick="setFilter('${filter.key}')">
            <span class="mdi ${filter.icon}"></span>
            ${filter.label}
            <span class="chip-count">${count}</span>
          </div>
        `;
      }).join('');
    }

    function setFilter(key) {
      activeFilter = key;
      renderFilterBar(allFiles);
      renderMobileList(allFiles);
    }

    // ==== Utils ====
    function isMobile() {
      return window.innerWidth <= 768;
    }

    function formatSize(bytes) {
      if (!bytes) return '';
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      if (bytes < 1024 * 1024 * 1024) return (bytes / 1024 / 1024).toFixed(1) + ' MB';
      return (bytes / 1024 / 1024 / 1024).toFixed(2) + ' GB';
    }

    function showToast(msg, type = 'info') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      const icon = type === 'error' ? 'mdi-alert-circle-outline' : 'mdi-information-outline';
      toast.innerHTML = `<span class="mdi ${icon}"></span> ${msg}`;
      container.appendChild(toast);
      setTimeout(() => {
        toast.classList.add('fade-out');
        setTimeout(() => toast.remove(), 600);
      }, isMobile() ? 3000 : 2300);
    }

    // ==== File type icons ====
    function getFileTypeIcon(file) {
      if (file.isFolder) return '<span class="mdi mdi-folder file-icon" style="color:#ffb300"></span>';
      const ext = (file.name || '').split('.').pop().toLowerCase();
      const map = {
        xml: ['mdi-xml', '#7d63e0'], py: ['mdi-language-python', '#306998'],
        php: ['mdi-language-php', '#6e4fbb'], json: ['mdi-code-json', '#01a98e'],
        exe: ['mdi-cog', '#455a64'], apk: ['mdi-android', '#43b755'],
        cs: ['mdi-language-csharp', '#512bd4'], js: ['mdi-language-javascript', '#efd81d'],
        html: ['mdi-language-html5', '#e34c26'], css: ['mdi-language-css3', '#2965f1'],
        zip: ['mdi-folder-zip', '#607d8b'], rar: ['mdi-folder-zip', '#607d8b'],
        txt: ['mdi-file-document-outline', '#222'], pdf: ['mdi-file-pdf-box', '#ea4335'],
        doc: ['mdi-file-word-box', '#4285f4'], docx: ['mdi-file-word-box', '#4285f4'],
        xls: ['mdi-file-excel-box', '#34a853'], xlsx: ['mdi-file-excel-box', '#34a853'],
        png: ['mdi-file-image', '#fbc02d'], jpg: ['mdi-file-image', '#fbc02d'],
        jpeg: ['mdi-file-image', '#fbc02d'], gif: ['mdi-file-image', '#fbc02d'],
        mp3: ['mdi-file-music', '#9c27b0'], wav: ['mdi-file-music', '#9c27b0'],
        mp4: ['mdi-file-video', '#00acc1'], mov: ['mdi-file-video', '#00acc1'],
      };
      const [icon, color] = map[ext] || ['mdi-file-outline', '#636c72'];
      return `<span class="mdi ${icon} file-icon" style="color:${color}"></span>`;
    }

    // ==== Breadcrumbs ====
    function renderBreadcrumbs() {
      const bc = document.getElementById('breadcrumbs');
      bc.innerHTML = '';
      breadcrumbs.forEach((b, i) => {
        if (i > 0) bc.innerHTML += `<span class="mdi mdi-chevron-right"></span>`;
        if (i === breadcrumbs.length - 1) {
          bc.innerHTML += `<span class="breadcrumb-current">${b.name}</span>`;
        } else {
          bc.innerHTML += `<span onclick="openFolderByBreadcrumb(${i})">${b.name}</span>`;
        }
      });
    }

    function openFolderByBreadcrumb(idx) {
      breadcrumbs = breadcrumbs.slice(0, idx + 1);
      openFolder(breadcrumbs[idx].id, false);
    }

    // ==== Render rows ====
    function renderFileRow(f) {
      return `
        <tr>
          <td class="col-name">
            ${getFileTypeIcon(f)}
            ${f.isFolder
          ? `<span class="folder-link" onclick="openFolder('${f.id}')">${f.name}</span>`
          : `<span class="file-link">${f.name}</span>`
        }
          </td>
          <td class="col-time">${f.modifiedTime ? new Date(f.modifiedTime).toLocaleString('vi-VN') : ''}</td>
          <td class="col-size">${f.size ? formatSize(f.size) : ''}</td>
          <td>
            <div class="action-group" style="align-items: center;">
              ${!f.isFolder && f.downloadCount > 0 ? `<span class="download-count-badge" title="Số lượt tải"><span class="mdi mdi-download-outline"></span> ${f.downloadCount}</span>` : ''}
              ${!f.isFolder ? `
                <a class="btn-action btn-download mdi mdi-download" title="Tải về" href="${API_BASE}${f.downloadUrl}" download></a>
              ` : ''}
            </div>
          </td>
        </tr>
      `;
    }

    function renderMobileFileRow(f) {
      const safeName = (f.name || '').replace(/[&<>"']/g, s =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[s])
      );
      const meta = f.isFolder ? 'Thư mục' : (f.size ? formatSize(f.size) : (f.mimeType || ''));

      return `
        <div class="mobile-file-item">
          <div class="mobile-file-header">
            ${getFileTypeIcon(f)}
            <div class="mobile-file-name">${safeName}</div>
          </div>
          <div class="mobile-file-meta">
            ${meta}
            ${!f.isFolder && f.downloadCount > 0 ? `<span class="mobile-download-count"><span class="mdi mdi-download-outline"></span> ${f.downloadCount}</span>` : ''}
          </div>
          <div class="mobile-file-actions">
            ${f.isFolder
          ? `<button class="btn-icon" onclick="openFolder('${f.id}')"><span class="mdi mdi-folder-open"></span> Mở</button>`
          : `<a class="btn-icon" href="${API_BASE}${f.downloadUrl}" download><span class="mdi mdi-download"></span> Tải về</a>`
        }
          </div>
        </div>
      `;
    }

    // ==== Render mobile list with active filter ====
    function renderMobileList(files) {
      const mobileList = document.getElementById('mobileFileList');
      const emptyNote = document.getElementById('emptyNote');
      const filter = FILTERS.find(f => f.key === activeFilter);
      const filtered = files.filter(filter.match);

      if (filtered.length === 0) {
        mobileList.innerHTML = '';
        emptyNote.style.display = '';
      } else {
        mobileList.innerHTML = filtered.map(renderMobileFileRow).join('');
        emptyNote.style.display = 'none';
      }
    }

    // ==== Fetch & display files ====
    async function fetchFiles(folderId) {
      const tbody = document.getElementById('fileListBody');
      const mobileList = document.getElementById('mobileFileList');
      const emptyNote = document.getElementById('emptyNote');

      tbody.innerHTML = `<tr><td colspan="4"><div class="loading"><div class="spinner"></div><div>Đang tải...</div></div></td></tr>`;
      mobileList.innerHTML = `<div class="loading"><div class="spinner"></div><div>Đang tải...</div></div>`;
      emptyNote.style.display = 'none';

      try {
        const url = `${API_BASE}/files${folderId ? '?parentId=' + encodeURIComponent(folderId) : ''}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error('Lỗi tải danh sách');
        const files = await res.json();

        files.sort((a, b) => {
          if (a.isFolder && !b.isFolder) return -1;
          if (!a.isFolder && b.isFolder) return 1;
          return a.name.localeCompare(b.name, 'vi');
        });

        allFiles = files;
        activeFilter = 'all';

        if (files.length === 0) {
          tbody.innerHTML = '';
          mobileList.innerHTML = '';
          emptyNote.style.display = '';
        } else {
          tbody.innerHTML = files.map(renderFileRow).join('');
          emptyNote.style.display = 'none';
          renderFilterBar(files);
          renderMobileList(files);
        }
      } catch (err) {
        tbody.innerHTML = '';
        mobileList.innerHTML = '';
        showToast('Không thể tải danh sách file', 'error');
        console.error(err);
      }
    }

    // ==== Folder navigation ====
    async function openFolder(folderId, pushBread = true) {
      currentFolderId = folderId;

      if (pushBread) {
        let name = 'Thư mục';
        if (folderId && folderNameMap[folderId]) {
          name = folderNameMap[folderId];
        }
        breadcrumbs.push({ id: folderId, name });
      }

      renderBreadcrumbs();
      await fetchFiles(folderId);
    }

    // Capture folder name when clicking into a folder
    async function openFolderWithName(folderId, folderName) {
      folderNameMap[folderId] = folderName;
      await openFolder(folderId, true);
    }

    // Override renderFileRow to pass name
    function renderFileRow(f) {
      return `
        <tr>
          <td class="col-name">
            ${getFileTypeIcon(f)}
            ${f.isFolder
          ? `<span class="folder-link" onclick="openFolderWithName('${f.id}', '${f.name.replace(/'/g, "\\'")}')">${f.name}</span>`
          : `<span class="file-link">${f.name}</span>`
        }
          </td>
          <td class="col-time">${f.modifiedTime ? new Date(f.modifiedTime).toLocaleString('vi-VN') : ''}</td>
          <td class="col-size">${f.size ? formatSize(f.size) : ''}</td>
          <td>
            <div class="action-group" style="align-items: center;">
              ${!f.isFolder && f.downloadCount > 0 ? `<span class="download-count-badge" title="Số lượt tải"><span class="mdi mdi-download-outline"></span> ${f.downloadCount}</span>` : ''}
              ${!f.isFolder ? `
                <a class="btn-action btn-download mdi mdi-download" title="Tải về" href="${API_BASE}${f.downloadUrl}" download></a>
              ` : ''}
            </div>
          </td>
        </tr>
      `;
    }

    // Classify file type for icon bg color
    function getFileClass(f) {
      if (f.isFolder) return 'mfi-folder';
      const e = ext(f);
      if (e === 'apk') return 'mfi-apk';
      if (['png', 'jpg', 'jpeg', 'gif', 'bmp', 'webp', 'svg'].includes(e)) return 'mfi-image';
      if (['mp4', 'mov', 'avi', 'mkv', 'webm'].includes(e)) return 'mfi-video';
      if (['mp3', 'wav', 'flac', 'ogg', 'aac'].includes(e)) return 'mfi-audio';
      if (['pdf', 'doc', 'docx', 'xls', 'xlsx', 'ppt', 'pptx', 'txt', 'csv'].includes(e)) return 'mfi-doc';
      if (['zip', 'rar', '7z', 'tar', 'gz'].includes(e)) return 'mfi-archive';
      if (['js', 'ts', 'py', 'php', 'cs', 'java', 'html', 'css', 'json', 'xml', 'sh', 'cpp', 'c', 'go', 'rs'].includes(e)) return 'mfi-code';
      if (['exe', 'msi', 'dmg', 'deb', 'rpm'].includes(e)) return 'mfi-exe';
      return 'mfi-other';
    }

    function getFileLabel(f) {
      if (f.isFolder) return 'Thư mục';
      const e = ext(f);
      const labels = {
        apk: 'APK', exe: 'EXE', msi: 'MSI', dmg: 'DMG',
        pdf: 'PDF', doc: 'Word', docx: 'Word', xls: 'Excel', xlsx: 'Excel',
        ppt: 'PowerPoint', pptx: 'PowerPoint', txt: 'Văn bản', csv: 'CSV',
        zip: 'ZIP', rar: 'RAR', '7z': '7-Zip', tar: 'TAR', gz: 'GZ',
        mp3: 'MP3', wav: 'WAV', flac: 'FLAC', ogg: 'OGG', aac: 'AAC',
        mp4: 'MP4', mov: 'MOV', avi: 'AVI', mkv: 'MKV',
        png: 'PNG', jpg: 'JPG', jpeg: 'JPEG', gif: 'GIF', webp: 'WebP',
        js: 'JavaScript', ts: 'TypeScript', py: 'Python', php: 'PHP',
        html: 'HTML', css: 'CSS', json: 'JSON', xml: 'XML',
        cs: 'C#', java: 'Java', cpp: 'C++', go: 'Go',
      };
      const typeLabel = labels[e] ? labels[e] : (e ? e.toUpperCase() : 'Tệp');
      return f.size ? `${typeLabel} · ${formatSize(f.size)}` : typeLabel;
    }

    function renderMobileFileRow(f) {
      const safeName = (f.name || '').replace(/[&<>"']/g, s =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[s])
      );
      const safeJsName = f.name.replace(/'/g, "\\'");
      const iconClass = getFileClass(f);
      const iconHtml = getFileTypeIcon(f);

      const actionBtn = f.isFolder
        ? `<button class="mfi-action" onclick="openFolderWithName('${f.id}','${safeJsName}')" title="Mở">
             <span class="mdi mdi-chevron-right"></span>
           </button>`
        : `<a class="mfi-action" href="${API_BASE}${f.downloadUrl}" download title="Tải về">
             <span class="mdi mdi-download"></span>
           </a>`;

      return `
        <div class="mobile-file-item">
          <div class="mfi-icon ${iconClass}">${iconHtml}</div>
          <div class="mfi-info">
            <div class="mfi-name">${safeName}</div>
            <div class="mfi-meta">
              ${getFileLabel(f)}
              ${!f.isFolder && f.downloadCount > 0 ? `<span class="mobile-download-count"><span class="mdi mdi-download-outline"></span> ${f.downloadCount}</span>` : ''}
            </div>
          </div>
          ${actionBtn}
        </div>
      `;
    }

    // ==== Init ====
    window.onload = function () {
      breadcrumbs = [{ id: null, name: 'Tệp apk của Locket Wan' }];
      renderBreadcrumbs();
      fetchFiles(null);
    };
  </script>
</body>
